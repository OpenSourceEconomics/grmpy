repos:
-   repo: https://github.com/psf/black
    rev: 20.8b1
    hooks:
    - id: black
      language_version: python3.7
      exclude: ^docs/
-   repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v3.4.0
    hooks:
    - id: flake8
-   repo: https://github.com/PyCQA/isort
    rev: 5.7.0
    hooks:
    - id: isort
      name: isort
      exclude: ^docs/
      entry: isort
      require_serial: true
      language: python
      types: [python]

